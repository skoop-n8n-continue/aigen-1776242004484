<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Cache-Control Meta Tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Skoop Calendar</title>

    <link rel="stylesheet" href="styles.css?v=g7k2m9">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <section class="sidebar">
            <div id="clock">00:00</div>
            <div id="date">Loading...</div>

            <div class="upcoming-container">
                <h2 class="upcoming-title">Today's Schedule</h2>
                <div id="events-list">
                    <!-- Events populated by JS -->
                </div>
            </div>
        </section>

        <section class="main-content">
            <div class="calendar-header">
                <h1 id="month-year">Month Year</h1>
            </div>
            <div class="calendar-grid" id="calendar-grid">
                <!-- Calendar generated by JS -->
            </div>
        </section>
    </div>

    <div class="ticker-wrap">
        <div class="ticker">
            <div class="ticker-item">Welcome to Skoop Digital Signage</div>
            <div class="ticker-item">Daily Briefing at 9:00 AM</div>
            <div class="ticker-item">Weather: 72°F & Sunny</div>
            <div class="ticker-item">Have a productive day!</div>
            <div class="ticker-item">Welcome to Skoop Digital Signage</div>
            <div class="ticker-item">Daily Briefing at 9:00 AM</div>
            <div class="ticker-item">Weather: 72°F & Sunny</div>
            <div class="ticker-item">Have a productive day!</div>
        </div>
    </div>

    <script src="script.js?v=g7k2m9"></script>
</body>
</html>
